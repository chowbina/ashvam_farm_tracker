<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f4efe4">
<title>Kupya Tree Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f4efe4; --paper2:#ece3d2; --card:#fbf7ee;
  --ink:#241c14; --ink-soft:#5e5343; --ink-faint:#8a7d68;
  --line:#ddd0b6; --line-soft:#e7dcc6;
  --green:#2f5d3a; --green-d:#22452b; --gold:#b07e2c;
  --danger:#c0492f; --warn:#d08a1f;
  --fruit:#c2741c; --palm:#1c7a6a; --timber:#7a5326; --medic:#5e7a2a;
  --spice:#b23a2e; --floral:#9d3a72; --unknown:#736c5e;
  --shadow:0 1px 2px rgba(40,30,15,.06),0 8px 24px rgba(40,30,15,.07);
  --r:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);
  font-family:Archivo,system-ui,sans-serif;-webkit-text-size-adjust:100%}
body{overscroll-behavior-y:none}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--paper);
  background-image:radial-gradient(circle at 18% 0%,#f8f3e6 0,transparent 45%),
                   radial-gradient(circle at 100% 100%,#efe7d6 0,transparent 50%);
  position:relative}
/* ---------- header ---------- */
.bar{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--paper) 88%,transparent);
  backdrop-filter:saturate(1.4) blur(10px);-webkit-backdrop-filter:saturate(1.4) blur(10px);
  border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;
  display:flex;align-items:center;gap:10px;min-height:54px}
.bar .back{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--ink);
  width:38px;height:38px;border-radius:11px;font-size:19px;display:grid;place-items:center;flex:0 0 auto;cursor:pointer}
.bar .back:active{transform:scale(.94)}
.bar h1{font-family:Fraunces;font-weight:600;font-size:19px;letter-spacing:-.01em;margin:0;line-height:1.1}
.bar .sub{font-size:11.5px;color:var(--ink-faint);font-weight:500;letter-spacing:.02em}
.bar .grow{flex:1;min-width:0}
.bar .count{font-family:Fraunces;font-weight:600;font-size:13px;color:var(--green);
  background:color-mix(in srgb,var(--green) 12%,var(--paper));border:1px solid color-mix(in srgb,var(--green) 25%,var(--paper));
  padding:5px 10px;border-radius:999px;white-space:nowrap}
.wrap{padding:16px 14px calc(env(safe-area-inset-bottom) + 40px)}
/* ---------- block cards ---------- */
.lead{font-family:Fraunces;font-size:13px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--gold);font-weight:600;margin:4px 2px 14px}
.bcard{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
  border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;
  transition:transform .12s ease}
.bcard:active{transform:scale(.985)}
.bcard .glyph{flex:0 0 auto;width:52px;height:52px;border-radius:14px;display:grid;place-items:center;
  font-family:Fraunces;font-weight:700;font-size:25px;color:#fff;background:linear-gradient(150deg,var(--green),var(--green-d));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.18)}
.bcard .meta{flex:1;min-width:0}
.bcard .meta .nm{font-family:Fraunces;font-weight:600;font-size:19px;letter-spacing:-.01em}
.bcard .meta .sb{font-size:13px;color:var(--ink-soft);margin-top:1px}
.bcard .meta .ct{font-size:12px;color:var(--ink-faint);margin-top:6px;font-weight:500}
.bcard .chev{color:var(--ink-faint);font-size:22px}
/* ---------- search + legend ---------- */
.tools{display:flex;gap:8px;margin:2px 0 14px}
.search{flex:1;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:9px 12px}
.search input{border:0;background:transparent;outline:0;font:inherit;font-size:14px;color:var(--ink);width:100%}
.search input::placeholder{color:var(--ink-faint)}
.legbtn{flex:0 0 auto;border:1px solid var(--line);background:var(--card);border-radius:12px;
  padding:0 14px;font:inherit;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer}
.legend{display:none;flex-wrap:wrap;gap:6px 14px;background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:12px;margin:-6px 0 14px}
.legend.open{display:flex}
.legend .li{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-soft);font-weight:500}
.legend .sw{width:12px;height:12px;border-radius:4px}
/* ---------- strips & chips ---------- */
.lane{margin-bottom:14px}
.lane .lh{display:flex;align-items:center;gap:8px;margin:0 2px 8px}
.lane .lh .lbl{font-family:Fraunces;font-weight:600;font-size:14px;letter-spacing:.01em}
.lane .lh .tag{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  padding:2px 7px;border-radius:6px;color:var(--ink-faint);border:1px solid var(--line-soft)}
.lane .lh .ln{flex:1;height:1px;background:var(--line-soft)}
.lane .lh .n{font-size:11px;color:var(--ink-faint);font-weight:500}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{position:relative;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;
  min-width:60px;min-height:42px;padding:5px 9px;border-radius:11px;cursor:pointer;
  border:1px solid var(--cc);background:color-mix(in srgb,var(--cc) 12%,var(--card));
  transition:transform .1s ease}
.chip:active{transform:scale(.93)}
.chip .cd{font-family:Fraunces;font-weight:700;font-size:14px;color:var(--cc);line-height:1;letter-spacing:.01em}
.chip .ps{font-size:9.5px;font-weight:600;color:var(--ink-faint);margin-top:3px;letter-spacing:.02em}
.chip .dot{position:absolute;top:-3px;right:-3px;width:11px;height:11px;border-radius:50%;
  border:2px solid var(--card)}
.chip.hide{display:none}
.cat-fruit{--cc:var(--fruit)} .cat-palm{--cc:var(--palm)} .cat-timber{--cc:var(--timber)}
.cat-medic{--cc:var(--medic)} .cat-spice{--cc:var(--spice)} .cat-floral{--cc:var(--floral)}
.cat-unknown{--cc:var(--unknown)}
.empty{color:var(--ink-faint);font-size:13px;text-align:center;padding:30px 0}
/* ---------- plant detail ---------- */
.phead{margin:2px 0 16px}
.phead .badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;
  letter-spacing:.05em;text-transform:uppercase;padding:4px 10px;border-radius:999px;
  color:var(--cc);background:color-mix(in srgb,var(--cc) 13%,var(--card));border:1px solid color-mix(in srgb,var(--cc) 35%,var(--card))}
.phead h2{font-family:Fraunces;font-weight:600;font-size:27px;letter-spacing:-.015em;margin:12px 0 2px;line-height:1.05}
.phead .loc{font-size:13px;color:var(--ink-soft);margin-top:1px}
.phead .sci{font-size:12.5px;color:var(--ink-faint);font-style:italic;margin-top:6px}
.sect{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.sect h3{font-family:Fraunces;font-weight:600;font-size:14px;letter-spacing:.02em;margin:0 0 10px;color:var(--ink)}
.seg{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.seg button{appearance:none;border:1px solid var(--line);background:var(--paper);color:var(--ink-soft);
  font:inherit;font-weight:600;font-size:13px;padding:10px 8px;border-radius:10px;cursor:pointer;transition:.12s}
.seg button[aria-pressed=true]{color:#fff}
.seg button.s-Healthy[aria-pressed=true]{background:var(--green);border-color:var(--green)}
.seg button.s-Needs[aria-pressed=true]{background:var(--warn);border-color:var(--warn)}
.seg button.s-Diseased[aria-pressed=true]{background:var(--danger);border-color:var(--danger)}
.seg button.s-Dead[aria-pressed=true]{background:#555;border-color:#555}
.field{margin-top:11px}
.field label{display:block;font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px}
.field input,.field textarea{width:100%;border:1px solid var(--line);background:var(--paper);color:var(--ink);
  font:inherit;font-size:14px;border-radius:10px;padding:10px 11px;outline:0;resize:vertical}
.field input:focus,.field textarea:focus{border-color:var(--green)}
.addph{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:1.5px dashed var(--line);
  background:var(--paper);color:var(--green);font:inherit;font-weight:600;font-size:14px;border-radius:11px;
  padding:13px;cursor:pointer}
.addph:active{transform:scale(.98)}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:11px}
.gallery figure{margin:0;position:relative}
.gallery img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;border:1px solid var(--line);cursor:pointer;display:block}
.gallery figcaption{font-size:10px;color:var(--ink-faint);text-align:center;margin-top:3px;font-weight:500}
.gallery .del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;border:0;
  background:rgba(20,12,4,.62);color:#fff;font-size:13px;line-height:1;cursor:pointer;display:grid;place-items:center}
.saved{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 20px);
  background:var(--green-d);color:#fff;font-size:13px;font-weight:600;padding:9px 16px;border-radius:999px;
  box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .2s;z-index:60}
.saved.show{opacity:1}
.lightbox{position:fixed;inset:0;background:rgba(15,10,4,.92);display:none;place-items:center;z-index:70;padding:20px}
.lightbox.open{display:grid}
.lightbox img{max-width:100%;max-height:88vh;border-radius:12px}
.hint{font-size:12px;color:var(--ink-faint);margin-top:9px;line-height:1.5}
</style>
</head>
<body>

  <main class="wrap" id="view"></main>
</div>

<div class="saved" id="toast">Saved</div>
<div class="lightbox" id="lightbox"><img id="lbimg" alt=""></div>

": "Areca catechu"}, {"id": "KP-0863", "pos": "P4", "local": "Adike", "eng": "Arecanut", "cat": "Palm", "catkey": "palm", "short": "ARC", "reason": "Mid-row specimen", "sci": "Areca catechu"}, {"id": "KP-0864", "pos": "P5", "local": "Baale", "eng": "Banana", "cat": "Fruit", "catkey": "fruit", "short": "BAN", "reason": "Mid-row specimen", "sci": "Musa sp."}, {"id": "KP-0865", "pos": "P6", "local": "Adike", "eng": "Arecanut", "cat": "Palm", "catkey": "palm", "short": "ARC", "reason": "Mid-row specimen", "sci": "Areca catechu"}, {"id": "KP-0866", "pos": "P7", "local": "Adike", "eng": "Arecanut", "cat": "Palm", "catkey": "palm", "short": "ARC", "reason": "Mid-row specimen", "sci": "Areca catechu"}, {"id": "KP-0867", "pos": "P8", "local": "Baale", "eng": "Banana", "cat": "Fruit", "catkey": "fruit", "short": "BAN", "reason": "Mid-row specimen", "sci": "Musa sp."}, {"id": "KP-0868", "pos": "P9", "local": "Adike", "eng": "Arecanut", "cat": "Palm", "catkey": "palm", "short": "ARC", "reason": "Mid-row specimen", "sci": "Areca catechu"}, {"id": "KP-0869", "pos": "P10", "local": "Adike", "eng": "Arecanut", "cat": "Palm", "catkey": "palm", "short": "ARC", "reason": "Mid-row specimen", "sci": "Areca catechu"}, {"id": "KP-0870", "pos": "P11", "local": "Baale", "eng": "Banana", "cat": "Fruit", "catkey": "fruit", "short": "BAN", "reason": "Mid-row specimen", "sci": "Musa sp."}]}, {"strip": "Mid-29", "type": "mid", "plants": [{"id": "KP-0871", "pos": "P2", "local": "Baale", "eng": "Banana", "cat": "Fruit", "catkey": "fruit", "short": "BAN", "reason": "Mid-row specimen", "sci": "Musa sp."}, {"id": "KP-0872", "pos": "P5", "local": "Baale", "eng": "Banana", "cat": "Fruit", "catkey": "fruit", "short": "BAN", "reason": "Mid-row specimen", "sci": "Musa sp."}, {"id": "KP-0873", "pos": "P8", "local": "Baale", "eng": "Banana", "cat": "Fruit", "catkey": "fruit", "short": "BAN", "reason": "Mid-row specimen", "sci": "Musa sp."}]}, {"strip": "R30 (G)", "type": "coconut", "plants": [{"id": "KP-0874", "pos": "P1", "local": "Tengu", "eng": "Coconut", "cat": "Palm", "catkey": "palm", "short": "COC", "reason": "Coconut (Tengu) in Gliricidia row", "sci": "Cocos nucifera"}]}]}]};
const STATUSES = ["Healthy","Needs Attention","Diseased","Dead"];
const CATLEGEND = [["fruit","Fruit"],["palm","Palm"],["timber","Timber / Forest"],
  ["medic","Medicinal"],["spice","Spice"],["floral","Floral / Sacred"],["unknown","Verify"]];

/* ---------- IndexedDB ---------- */
function db(){return new Promise((res,rej)=>{const r=indexedDB.open("kupya",1);
  r.onupgradeneeded=()=>r.result.createObjectStore("plants",{keyPath:"id"});
  r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function getRec(id){const d=await db();return new Promise(res=>{
  const t=d.transaction("plants").objectStore("plants").get(id);
  t.onsuccess=()=>res(t.result||{id,status:"Healthy",condition:"",action:"",notes:"",photos:[]});
  t.onerror=()=>res({id,status:"Healthy",condition:"",action:"",notes:"",photos:[]});});}
async function putRec(rec){const d=await db();return new Promise((res,rej)=>{
  const t=d.transaction("plants","readwrite").objectStore("plants").put(rec);
  t.onsuccess=()=>res();t.onerror=()=>rej(t.error);});}
async function allRecs(){const d=await db();return new Promise(res=>{const out={};
  const c=d.transaction("plants").objectStore("plants").openCursor();
  c.onsuccess=e=>{const cur=e.target.result;if(cur){out[cur.key]=cur.value;cur.continue();}else res(out);};
  c.onerror=()=>res(out);});}

/* ---------- helpers ---------- */
const $=s=>document.querySelector(s);
const el=(t,c,txt)=>{const e=document.createElement(t);if(c)e.className=c;if(txt!=null)e.textContent=txt;return e;};
const findPlant=id=>{for(const b of DATA.blocks)for(const s of b.strips)for(const p of s.plants)if(p.id===id)return {p,b,s};return null;};
const findBlock=code=>DATA.blocks.find(b=>b.code===code);
let toastT;
function toast(){const t=$("#toast");t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),1100);}
function statusColor(s){return s==="Healthy"?"var(--green)":s==="Needs Attention"?"var(--warn)":s==="Diseased"?"var(--danger)":"#555";}

/* ---------- router ---------- */
function route(){const h=location.hash.replace(/^#\/?/,"");const [a,b]=h.split("/");
  if(a==="block"&&findBlock(b))renderBlock(b);
  else if(a==="plant"&&findPlant(b))renderPlant(b);
  else renderHome();}
window.addEventListener("hashchange",route);
function setHeader(title,sub,showBack,count){
  $("#title").textContent=title; $("#subtitle").textContent=sub;
  $("#back").style.display=showBack?"grid":"none";
  const c=$("#hcount"); if(count){c.style.display="";c.textContent=count;}else c.style.display="none";
  window.scrollTo(0,0);
}
$("#back").onclick=()=>history.back();

/* ---------- home (blocks) ---------- */
function renderHome(){
  setHeader("Kupya","Natural Model Farm — select a block",false,null);
  const v=$("#view");v.innerHTML="";
  v.appendChild(el("div","lead","Blocks"));
  DATA.blocks.forEach(b=>{
    const c=el("div","bcard");c.onclick=()=>location.hash="#/block/"+b.code;
    c.appendChild(el("div","glyph",b.code));
    const m=el("div","meta");
    m.appendChild(el("div","nm",b.name));
    m.appendChild(el("div","sb",b.sub));
    m.appendChild(el("div","ct",b.count+" tracked plants · "+b.strips.length+" rows"));
    c.appendChild(m);c.appendChild(el("div","chev","›"));
    v.appendChild(c);
  });
}

/* ---------- block view ---------- */
async function renderBlock(code){
  const b=findBlock(code);
  setHeader(b.name,b.sub,true,b.count+" plants");
  const recs=await allRecs();
  const v=$("#view");v.innerHTML="";
  // tools
  const tools=el("div","tools");
  const sb=el("div","search");sb.innerHTML='<span style="color:var(--ink-faint)">⌕</span>';
  const inp=el("input");inp.type="search";inp.placeholder="Filter plants in this block…";
  sb.appendChild(inp);tools.appendChild(sb);
  const lb=el("button","legbtn","Key");tools.appendChild(lb);
  v.appendChild(tools);
  const leg=el("div","legend");
  CATLEGEND.forEach(([k,name])=>{const li=el("div","li");const sw=el("span","sw");
    sw.style.background="var(--"+k+")";li.appendChild(sw);li.appendChild(el("span",null,name));leg.appendChild(li);});
  v.appendChild(leg);
  lb.onclick=()=>leg.classList.toggle("open");

  b.strips.forEach(s=>{
    const lane=el("div","lane");lane.dataset.lane="1";
    const lh=el("div","lh");
    lh.appendChild(el("span","lbl",s.strip));
    lh.appendChild(el("span","tag",s.type==="coconut"?"Coconut row":"Mid"));
    lh.appendChild(el("span","ln"));
    lh.appendChild(el("span","n",s.plants.length+""));
    lane.appendChild(lh);
    const chips=el("div","chips");
    s.plants.forEach(p=>{
      const ch=el("div","chip cat-"+p.catkey);
      ch.dataset.search=(p.short+" "+p.eng+" "+p.local).toLowerCase();
      ch.appendChild(el("span","cd",p.short));
      ch.appendChild(el("span","ps",p.pos));
      const r=recs[p.id];
      if(r&&r.status&&r.status!=="Healthy"){const d=el("span","dot");d.style.background=statusColor(r.status);ch.appendChild(d);}
      ch.onclick=()=>location.hash="#/plant/"+p.id;
      chips.appendChild(ch);
    });
    lane.appendChild(chips);
    v.appendChild(lane);
  });
  // search filter
  inp.oninput=()=>{const q=inp.value.trim().toLowerCase();
    document.querySelectorAll(".lane").forEach(lane=>{
      let any=false;
      lane.querySelectorAll(".chip").forEach(ch=>{
        const hit=!q||ch.dataset.search.includes(q);
        ch.classList.toggle("hide",!hit); if(hit)any=true;});
      lane.style.display=any?"":"none";
    });
  };
}

/* ---------- plant detail ---------- */
async function renderPlant(id){
  const {p,b,s}=findPlant(id);
  setHeader(p.eng,b.name+" · "+s.strip,true,null);
  const rec=await getRec(id);
  const v=$("#view");v.innerHTML="";

  const head=el("div","phead");head.style.cssText="--cc:var(--"+p.catkey+")";
  const badge=el("span","badge",p.cat);head.appendChild(badge);
  head.appendChild(el("h2",null,p.eng));
  const loc=el("div","loc");loc.innerHTML=b.name+" &middot; "+s.strip+" &middot; "+p.pos+" &middot; <span style='color:var(--ink-faint)'>"+id+"</span>";
  head.appendChild(loc);
  if(p.local && p.local!==p.eng) head.appendChild(el("div","sci",p.local+(p.sci&&p.sci!=="Verify"?" — "+p.sci:"")));
  v.appendChild(head);

  // status
  const sc=el("div","sect");sc.appendChild(el("h3","","Status"));
  const seg=el("div","seg");
  STATUSES.forEach(st=>{
    const cls="s-"+st.split(" ")[0];
    const btn=el("button",cls,st);btn.setAttribute("aria-pressed",rec.status===st);
    btn.onclick=async()=>{rec.status=st;seg.querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed","false"));
      btn.setAttribute("aria-pressed","true");await putRec(rec);toast();};
    seg.appendChild(btn);
  });
  sc.appendChild(seg);
  // condition + action
  const f1=el("div","field");f1.innerHTML="<label>Condition / disease</label>";
  const ci=el("input");ci.type="text";ci.value=rec.condition||"";ci.placeholder="e.g. leaf spot, borer";
  ci.onchange=async()=>{rec.condition=ci.value;await putRec(rec);toast();};f1.appendChild(ci);sc.appendChild(f1);
  const f2=el("div","field");f2.innerHTML="<label>Action needed</label>";
  const ai=el("input");ai.type="text";ai.value=rec.action||"";ai.placeholder="e.g. prune, neem spray";
  ai.onchange=async()=>{rec.action=ai.value;await putRec(rec);toast();};f2.appendChild(ai);sc.appendChild(f2);
  v.appendChild(sc);

  // photos
  const pc=el("div","sect");pc.appendChild(el("h3","","Photos"));
  const add=el("label","addph");add.innerHTML="＋&nbsp; Add photo";
  const file=el("input");file.type="file";file.accept="image/*";file.capture="environment";file.style.display="none";
  add.appendChild(file);pc.appendChild(add);
  const gal=el("div","gallery");pc.appendChild(gal);
  function drawGallery(){
    gal.innerHTML="";
    (rec.photos||[]).slice().reverse().forEach(ph=>{
      const fig=el("figure");const img=el("img");img.src=ph.url;img.alt="";
      img.onclick=()=>{$("#lbimg").src=ph.url;$("#lightbox").classList.add("open");};
      fig.appendChild(img);
      const del=el("button","del","×");del.onclick=async(e)=>{e.stopPropagation();
        rec.photos=rec.photos.filter(x=>x.id!==ph.id);await putRec(rec);drawGallery();toast();};
      fig.appendChild(del);
      fig.appendChild(el("figcaption",null,ph.date));
      gal.appendChild(fig);
    });
  }
  file.onchange=async()=>{const f=file.files[0];if(!f)return;
    const url=await compress(f);
    rec.photos=rec.photos||[];
    rec.photos.push({id:Date.now()+"",date:new Date().toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"}),url});
    await putRec(rec);file.value="";drawGallery();toast();};
  pc.appendChild(el("div","hint","Photos are taken with your camera and stored on this device. Add one each visit to build a growth timeline (newest first)."));
  drawGallery();
  v.appendChild(pc);

  // notes
  const nc=el("div","sect");nc.appendChild(el("h3","","Notes"));
  const ta=el("textarea");ta.rows=4;ta.value=rec.notes||"";ta.placeholder="Observations, treatments, anything worth remembering…";
  let nt;ta.oninput=()=>{clearTimeout(nt);nt=setTimeout(async()=>{rec.notes=ta.value;await putRec(rec);toast();},500);};
  nc.appendChild(ta);v.appendChild(nc);
}
$("#lightbox").onclick=()=>$("#lightbox").classList.remove("open");

/* ---------- image compression ---------- */
function compress(file){return new Promise(res=>{
  const reader=new FileReader();
  reader.onload=()=>{const img=new Image();img.onload=()=>{
    const max=1280;let w=img.width,h=img.height;const sc=Math.min(1,max/Math.max(w,h));
    const c=document.createElement("canvas");c.width=Math.round(w*sc);c.height=Math.round(h*sc);
    c.getContext("2d").drawImage(img,0,0,c.width,c.height);
    res(c.toDataURL("image/jpeg",.72));};img.src=reader.result;};
  reader.readAsDataURL(file);});}

route();
</script>
