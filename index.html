<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e1726">
<title>Ashvam Natural Farm - Plant Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1726; --bg2:#13213a; --surface:#172a45; --surface2:#20395b;
  --tile:#f2eee2; --tile-ink:#1b2a3f; --tile-faint:#857f6c; --tile-line:#d8d3c2;
  --ink:#e7eef8; --ink-soft:#a3b6d0; --ink-faint:#6f86a4;
  --line:#21344f; --line-soft:#2c4a6e;
  --green:#54cf9a; --green-d:#1f5d46; --gold:#e3b558;
  --danger:#f0654a; --warn:#f0a93c;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.32);
  --r:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:Archivo,system-ui,sans-serif;-webkit-text-size-adjust:100%}
body{overscroll-behavior-y:none}
.app{max-width:480px;margin:0 auto;min-height:100vh;
  background-image:radial-gradient(circle at 12% -5%,#16294a 0,transparent 44%),
                   radial-gradient(circle at 105% 102%,#123040 0,transparent 48%);position:relative}
.bar{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:saturate(1.3) blur(12px);-webkit-backdrop-filter:saturate(1.3) blur(12px);
  border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;
  display:flex;align-items:center;gap:10px;min-height:54px}
.bar .back{appearance:none;border:1px solid var(--line-soft);background:var(--surface);color:var(--ink);
  width:38px;height:38px;border-radius:11px;font-size:19px;display:grid;place-items:center;flex:0 0 auto;cursor:pointer}
.bar .back:active{transform:scale(.94)}
.bar h1{font-family:Fraunces;font-weight:600;font-size:19px;letter-spacing:-.01em;margin:0;line-height:1.1}
.bar .sub{font-size:11.5px;color:var(--ink-faint);font-weight:500;letter-spacing:.02em}
.bar .grow{flex:1;min-width:0}
.bar .count{font-family:Fraunces;font-weight:600;font-size:13px;color:var(--green);
  background:color-mix(in srgb,var(--green) 14%,var(--bg));border:1px solid color-mix(in srgb,var(--green) 30%,var(--bg));
  padding:5px 10px;border-radius:999px;white-space:nowrap}
.wrap{padding:16px 14px calc(env(safe-area-inset-bottom) + 40px)}
.lead{font-family:Fraunces;font-size:13px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--gold);font-weight:600;margin:4px 2px 14px}
.bcard{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s ease}
.bcard:active{transform:scale(.985)}
.bcard .glyph{flex:0 0 auto;width:52px;height:52px;border-radius:14px;display:grid;place-items:center;
  font-family:Fraunces;font-weight:700;font-size:25px;color:#0e1726;
  background:linear-gradient(150deg,var(--green),var(--gold));box-shadow:inset 0 1px 0 rgba(255,255,255,.3)}
.bcard .meta{flex:1;min-width:0}
.bcard .meta .nm{font-family:Fraunces;font-weight:600;font-size:19px;letter-spacing:-.01em}
.bcard .meta .sb{font-size:13px;color:var(--ink-soft);margin-top:1px}
.bcard .meta .ct{font-size:12px;color:var(--ink-faint);margin-top:6px;font-weight:500}
.bcard .chev{color:var(--ink-faint);font-size:22px}
.tools{display:flex;flex-direction:column;gap:8px;margin:2px 0 14px}
.search{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line-soft);
  border-radius:12px;padding:10px 12px}
.search input{border:0;background:transparent;outline:0;font:inherit;font-size:14px;color:var(--ink);width:100%}
.search input::placeholder{color:var(--ink-faint)}
.fcount{font-size:12px;color:var(--ink-faint);font-weight:500;padding:0 4px;min-height:15px}
.fcount b{color:var(--green);font-weight:700}
.pills{display:flex;gap:7px;flex-wrap:wrap}
.pill{appearance:none;border:1px solid var(--line-soft);background:var(--surface);color:var(--ink-soft);
  font:inherit;font-weight:600;font-size:12.5px;padding:7px 13px;border-radius:999px;cursor:pointer;transition:.12s}
.pill:active{transform:scale(.95)}
.pill[aria-pressed=true]{border-color:transparent}
.pill.p-all[aria-pressed=true]{background:var(--ink-soft);color:#0e1726}
.pill.p-needs[aria-pressed=true]{background:var(--warn);color:#0e1726}
.pill.p-diseased[aria-pressed=true]{background:var(--danger);color:#fff}
.pill.p-dead[aria-pressed=true]{background:#647488;color:#fff}
.lane{margin-bottom:14px}
.lane .lh{display:flex;align-items:center;gap:8px;margin:0 2px 8px}
.lane .lh .lbl{font-family:Fraunces;font-weight:600;font-size:14px;color:var(--ink)}
.lane .lh .tag{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  padding:2px 7px;border-radius:6px;color:var(--ink-faint);border:1px solid var(--line-soft)}
.lane .lh .ln{flex:1;height:1px;background:var(--line-soft)}
.lane .lh .n{font-size:11px;color:var(--ink-faint);font-weight:500}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{position:relative;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;
  min-width:58px;min-height:42px;padding:5px 9px;border-radius:11px;cursor:pointer;
  border:1px solid var(--tile-line);background:var(--tile);transition:transform .1s ease}
.chip:active{transform:scale(.93)}
.chip .cd{font-family:Fraunces;font-weight:700;font-size:14px;color:var(--tile-ink);line-height:1}
.chip .ps{font-size:9.5px;font-weight:600;color:var(--tile-faint);margin-top:3px}
.chip .dot{position:absolute;top:-3px;right:-3px;width:11px;height:11px;border-radius:50%;border:2px solid var(--bg)}
.chip.dead{background:#c6cad3;border-color:#a8aebd;opacity:.72}
.chip.dead .cd{color:#566072;text-decoration:line-through}
.chip.dead .deadtag{position:absolute;top:-6px;left:-4px;background:var(--danger);color:#fff;font-size:8px;
  font-weight:700;letter-spacing:.04em;padding:1px 5px;border-radius:5px}
.chip.hide{display:none}
.empty{color:var(--ink-faint);font-size:13px;text-align:center;padding:30px 0}
.phead{margin:2px 0 16px}
.phead .badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;padding:4px 10px;border-radius:999px;color:var(--ink-soft);
  background:var(--surface2);border:1px solid var(--line-soft)}
.phead h2{font-family:Fraunces;font-weight:600;font-size:28px;letter-spacing:-.015em;margin:12px 0 2px;line-height:1.04}
.phead .eng{font-size:15px;color:var(--ink-soft);font-weight:500;margin-top:2px}
.phead .loc{font-size:13px;color:var(--ink-faint);margin-top:8px}
.phead .sci{font-size:12.5px;color:var(--ink-faint);font-style:italic;margin-top:4px}
.sect{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.sect h3{font-family:Fraunces;font-weight:600;font-size:14px;letter-spacing:.02em;margin:0 0 10px;color:var(--ink)}
.seg{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.seg button{appearance:none;border:1px solid var(--line-soft);background:var(--bg2);color:var(--ink-soft);
  font:inherit;font-weight:600;font-size:13px;padding:10px 8px;border-radius:10px;cursor:pointer;transition:.12s}
.seg button[aria-pressed=true]{color:#0e1726}
.seg button.s-Healthy[aria-pressed=true]{background:var(--green);border-color:var(--green)}
.seg button.s-Needs[aria-pressed=true]{background:var(--warn);border-color:var(--warn)}
.seg button.s-Diseased[aria-pressed=true]{background:var(--danger);border-color:var(--danger);color:#fff}
.seg button.s-Dead[aria-pressed=true]{background:#647488;border-color:#647488;color:#fff}
.field{margin-top:11px}
.field label{display:block;font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px}
.field input,.field textarea{width:100%;border:1px solid var(--line-soft);background:var(--bg2);color:var(--ink);
  font:inherit;font-size:14px;border-radius:10px;padding:10px 11px;outline:0;resize:vertical}
.field input:focus,.field textarea:focus{border-color:var(--green)}
.addph{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:1.5px dashed var(--line-soft);
  background:var(--bg2);color:var(--green);font:inherit;font-weight:600;font-size:14px;border-radius:11px;padding:13px;cursor:pointer}
.addph:active{transform:scale(.98)}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:11px}
.gallery figure{margin:0;position:relative}
.gallery img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;border:1px solid var(--line-soft);cursor:pointer;display:block}
.gallery figcaption{font-size:10px;color:var(--ink-faint);text-align:center;margin-top:3px;font-weight:500}
.gallery .del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;border:0;
  background:rgba(0,0,0,.6);color:#fff;font-size:13px;line-height:1;cursor:pointer;display:grid;place-items:center}
.saved{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 20px);
  background:var(--green);color:#0e1726;font-size:13px;font-weight:700;padding:9px 16px;border-radius:999px;
  box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .2s;z-index:60}
.saved.show{opacity:1}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);display:none;place-items:center;z-index:70;padding:20px}
.lightbox.open{display:grid}
.lightbox img{max-width:100%;max-height:88vh;border-radius:12px}
.hint{font-size:12px;color:var(--ink-faint);margin-top:9px;line-height:1.5}
.login{position:fixed;inset:0;display:grid;place-items:center;z-index:80;padding:24px;
  background:var(--bg);
  background-image:radial-gradient(circle at 12% -5%,#16294a 0,transparent 44%),
                   radial-gradient(circle at 105% 102%,#123040 0,transparent 48%)}
.loginCard{width:100%;max-width:340px;background:var(--surface);border:1px solid var(--line);
  border-radius:18px;padding:26px 22px 22px;box-shadow:var(--shadow)}
.loginCard .brand{font-family:Fraunces;font-weight:600;font-size:30px;letter-spacing:-.02em;color:var(--ink)}
.loginCard .tag{font-family:Fraunces;font-size:12px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--gold);font-weight:600;margin:2px 0 20px}
.loginCard label{display:block;font-size:11.5px;font-weight:600;letter-spacing:.04em;
  text-transform:uppercase;color:var(--ink-faint);margin:14px 0 5px}
.loginCard input{width:100%;border:1px solid var(--line-soft);background:var(--bg2);color:var(--ink);
  font:inherit;font-size:15px;border-radius:10px;padding:11px 12px;outline:0}
.loginCard input:focus{border-color:var(--green)}
.loginCard button{width:100%;margin-top:20px;border:0;border-radius:11px;padding:13px;cursor:pointer;
  font:inherit;font-weight:700;font-size:15px;color:#0e1726;
  background:linear-gradient(150deg,var(--green),var(--gold))}
.loginCard button:active{transform:scale(.99)}
.loginCard .msg{min-height:18px;margin-top:12px;font-size:12.5px;color:var(--danger);text-align:center}
.exportbtn{appearance:none;width:100%;margin-top:10px;border:1px solid var(--line-soft);
  background:var(--surface);color:var(--ink-soft);font:inherit;font-weight:600;font-size:14px;
  border-radius:12px;padding:13px;cursor:pointer;transition:.12s}
.exportbtn:active{transform:scale(.99)}
.exportbtn:disabled{opacity:.6;cursor:default}
.exphint{font-size:11.5px;color:var(--ink-faint);text-align:center;margin:8px 4px 0;line-height:1.5}
.signout{appearance:none;border:1px solid var(--line-soft);background:var(--surface);color:var(--ink-soft);
  width:38px;height:38px;border-radius:11px;font-size:17px;display:grid;place-items:center;flex:0 0 auto;cursor:pointer}
.signout:active{transform:scale(.94)}
</style>
</head>
<body>
<div class="app" style="display:none">
  <header class="bar">
    <button class="back" id="back" style="display:none" aria-label="Back">‹</button>
    <div class="grow"><h1 id="title">Ashvam Natural Farm</h1><div class="sub" id="subtitle">Plant Tracker</div></div>
    <span class="count" id="hcount" style="display:none"></span>
    <button class="signout" id="signout" style="display:none" title="Sign out" aria-label="Sign out">⏻</button>
  </header>
  <main class="wrap" id="view"></main>
</div>
<div class="saved" id="toast">Saved</div>
<div class="lightbox" id="lightbox"><img id="lbimg" alt=""></div>

<div class="login" id="login">
  <div class="loginCard">
    <div class="brand">Ashvam Natural Farm</div>
    <div class="tag">Plant Tracker</div>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="username" inputmode="email" placeholder="you@example.com">
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">
    <button id="loginBtn" type="button">Sign in</button>
    <div class="msg" id="loginMsg"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let DATA = {blocks:[]};
const STATUSES=["Healthy","Needs Attention","Diseased","Dead"];

/* ===== Supabase: paste your two project values below ===== */
const SUPABASE_URL  = "https://gsvpvuvzlwhztbtjvtnu.supabase.co";
const SUPABASE_KEY  = "YOUR-PUBLISHABLE-KEY";
const PHOTO_BUCKET  = "plant-photos";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const blankRec = id => ({id,status:"",condition:"",action:"",notes:"",photos:[]});
const shapeRec = d => ({id:d.id,status:d.status||"",condition:d.condition||"",
  action:d.action||"",notes:d.notes||"",photos:d.photos||[]});

async function getRec(id){
  const {data,error}=await sb.from("plant_records").select("*").eq("id",id).maybeSingle();
  if(error){console.error(error);return blankRec(id);}
  return data?shapeRec(data):blankRec(id);
}
async function putRec(rec){
  const row={id:rec.id,status:rec.status||"",condition:rec.condition||"",
    action:rec.action||"",notes:rec.notes||"",photos:rec.photos||[],
    updated_at:new Date().toISOString()};
  const {error}=await sb.from("plant_records").upsert(row);
  if(error){console.error(error);alert("Save failed \u2014 check your connection.");throw error;}
}
async function allRecs(){
  const out={};
  const {data,error}=await sb.from("plant_records").select("*");
  if(error){console.error(error);return out;}
  (data||[]).forEach(d=>{out[d.id]=shapeRec(d);});
  return out;
}

/* Load the plant catalog from Supabase and rebuild DATA.blocks (ordered by id) */
async function loadCatalog(){
  if(DATA.blocks.length) return;
  const {data,error}=await sb.from("plants").select("*").order("id");
  if(error){console.error(error);alert("Couldn't load the plant catalog \u2014 check your connection.");return;}
  const blocks=[]; let cb=null, cs=null;
  (data||[]).forEach(r=>{
    if(!cb||cb.code!==r.block_code){cb={code:r.block_code,name:r.block_name,sub:r.block_sub,count:0,strips:[]};blocks.push(cb);cs=null;}
    if(!cs||cs.strip!==r.strip){cs={strip:r.strip,type:r.strip_type,plants:[]};cb.strips.push(cs);}
    cs.plants.push({pos:r.pos,local:r.local_name,eng:r.eng,short:r.short,sci:r.sci,cat:r.cat,dead:r.dead,id:r.id});
    cb.count++;
  });
  DATA.blocks=blocks;
}

/* Upload a compressed JPEG (data URL) to Storage; return its URL + path */
async function uploadPhoto(plantId, dataUrl){
  const blob=await (await fetch(dataUrl)).blob();
  const path=plantId+"/"+Date.now()+"-"+Math.random().toString(36).slice(2,6)+".jpg";
  const {error}=await sb.storage.from(PHOTO_BUCKET).upload(path,blob,{contentType:"image/jpeg"});
  if(error){console.error(error);alert("Photo upload failed.");throw error;}
  const {data}=sb.storage.from(PHOTO_BUCKET).getPublicUrl(path);
  return {url:data.publicUrl,path};
}
async function deletePhoto(path){
  if(!path)return;
  const {error}=await sb.storage.from(PHOTO_BUCKET).remove([path]);
  if(error)console.error(error);
}

const $=s=>document.querySelector(s);
const el=(t,c,txt)=>{const e=document.createElement(t);if(c)e.className=c;if(txt!=null)e.textContent=txt;return e;};
const findPlant=id=>{for(const b of DATA.blocks)for(const s of b.strips)for(const p of s.plants)if(p.id===id)return {p,b,s};return null;};
const findBlock=code=>DATA.blocks.find(b=>b.code===code);
const effStatus=(p,rec)=>(rec&&rec.status)?rec.status:(p.dead?"Dead":"Healthy");
function statusColor(s){return s==="Healthy"?"var(--green)":s==="Needs Attention"?"var(--warn)":s==="Diseased"?"var(--danger)":"#647488";}
let toastT;function toast(){const t=$("#toast");t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),1100);}

function route(){const h=location.hash.replace(/^#\/?/,"");const [a,b]=h.split("/");
  if(a==="block"&&findBlock(b))renderBlock(b);
  else if(a==="plant"&&findPlant(b))renderPlant(b);
  else renderHome();}
window.addEventListener("hashchange",route);
function setHeader(title,sub,showBack,count){
  $("#title").textContent=title;$("#subtitle").textContent=sub;
  $("#back").style.display=showBack?"grid":"none";
  const c=$("#hcount");if(count){c.style.display="";c.textContent=count;}else c.style.display="none";
  window.scrollTo(0,0);}
$("#back").onclick=()=>history.back();

function renderHome(){
  setHeader("Ashvam Natural Farm","Plant Tracker — select a block",false,null);
  const v=$("#view");v.innerHTML="";v.appendChild(el("div","lead","Blocks"));
  DATA.blocks.forEach(b=>{
    const c=el("div","bcard");c.onclick=()=>location.hash="#/block/"+b.code;
    c.appendChild(el("div","glyph",b.code));
    const m=el("div","meta");m.appendChild(el("div","nm",b.name));
    m.appendChild(el("div","sb",b.sub));
    m.appendChild(el("div","ct",b.count+" tracked plants · "+b.strips.length+" rows"));
    c.appendChild(m);c.appendChild(el("div","chev","›"));v.appendChild(c);});
  if(!DATA.blocks.length) v.appendChild(el("div","empty","No plants loaded yet \u2014 run the catalog SQL in Supabase, then reopen the app."));
  const exp=el("button","exportbtn","\u2193  Export my data to a file");
  exp.onclick=()=>exportData(exp);
  v.appendChild(exp);
  v.appendChild(el("div","exphint","Saves every record you've entered (status, notes, photo links) as a JSON backup on this device."));
}

async function exportData(btn){
  if(btn){btn.disabled=true;btn.textContent="Gathering your data\u2026";}
  try{
    const recs=await allRecs();
    const payload={app:"Ashvam Natural Farm - Plant Tracker",
      exported:new Date().toISOString(),count:Object.keys(recs).length,records:recs};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download="ashvam-plant-tracker-"+new Date().toISOString().slice(0,10)+".json";
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),1500);
  }catch(e){console.error(e);alert("Export failed \u2014 check your connection.");}
  if(btn){btn.disabled=false;btn.textContent="\u2193  Export my data to a file";}
}

async function renderBlock(code){
  const b=findBlock(code);
  setHeader(b.name,b.sub,true,b.count+" plants");
  const recs=await allRecs();
  const v=$("#view");v.innerHTML="";
  let activeStatus="all";
  const STLABEL={all:"All",needs:"Needs Attention",diseased:"Diseased",dead:"Dead"};
  const tools=el("div","tools");
  const sb=el("div","search");sb.innerHTML='<span style="color:var(--ink-faint)">⌕</span>';
  const inp=el("input");inp.type="search";inp.placeholder="Filter plants in this block…";
  sb.appendChild(inp);tools.appendChild(sb);
  const pillRow=el("div","pills");const pillBtns={};
  [["all","All"],["needs","Needs"],["diseased","Diseased"],["dead","Dead"]].forEach(function(e){
    const k=e[0],lbl=e[1];const btn=el("button","pill p-"+k,lbl);btn.setAttribute("aria-pressed",k==="all");
    btn.onclick=function(){activeStatus=k;Object.values(pillBtns).forEach(x=>x.setAttribute("aria-pressed","false"));
      btn.setAttribute("aria-pressed","true");applyFilters();};
    pillBtns[k]=btn;pillRow.appendChild(btn);});
  tools.appendChild(pillRow);
  const fc=el("div","fcount");tools.appendChild(fc);
  v.appendChild(tools);

  const total=b.count;
  b.strips.forEach(s=>{
    const lane=el("div","lane");
    const lh=el("div","lh");
    lh.appendChild(el("span","lbl",s.strip));
    lh.appendChild(el("span","tag",s.type==="coconut"?"Coconut row":"Mid"));
    lh.appendChild(el("span","ln"));
    lh.appendChild(el("span","n",s.plants.length+""));
    lane.appendChild(lh);
    const chips=el("div","chips");
    s.plants.forEach(p=>{
      const rec=recs[p.id];const st=effStatus(p,rec);
      const ch=el("div","chip"+(st==="Dead"?" dead":""));
      ch.dataset.search=(p.short+" "+p.eng+" "+p.local).toLowerCase();
      ch.dataset.status=st;
      if(st==="Dead"){ch.appendChild(el("span","deadtag","DEAD"));}
      ch.appendChild(el("span","cd",p.short));
      ch.appendChild(el("span","ps",p.pos));
      if(st!=="Healthy"&&st!=="Dead"){const d=el("span","dot");d.style.background=statusColor(st);ch.appendChild(d);}
      ch.onclick=()=>location.hash="#/plant/"+p.id;
      chips.appendChild(ch);
    });
    lane.appendChild(chips);v.appendChild(lane);
  });

  function statusMatch(s){return activeStatus==="all"
    ||(activeStatus==="needs"&&s==="Needs Attention")
    ||(activeStatus==="diseased"&&s==="Diseased")
    ||(activeStatus==="dead"&&s==="Dead");}
  function applyFilters(){
    const q=inp.value.trim().toLowerCase();
    document.querySelectorAll(".lane").forEach(lane=>{let any=false;
      lane.querySelectorAll(".chip").forEach(ch=>{
        const hit=(!q||ch.dataset.search.includes(q))&&statusMatch(ch.dataset.status);
        ch.classList.toggle("hide",!hit);if(hit)any=true;});
      lane.style.display=any?"":"none";});
    const n=document.querySelectorAll(".chip:not(.hide)").length;
    if(!q&&activeStatus==="all"){fc.textContent="";return;}
    fc.innerHTML="<b>"+n+"</b> of "+total+" plants"
      +(activeStatus!=="all"?" · "+STLABEL[activeStatus]:"")
      +(q?" matching \u201C"+q+"\u201D":"");
  }
  inp.oninput=applyFilters;
}

async function renderPlant(id){
  const {p,b,s}=findPlant(id);
  setHeader(p.local,b.name+" · "+s.strip,true,null);
  const rec=await getRec(id);
  const v=$("#view");v.innerHTML="";

  const head=el("div","phead");
  head.appendChild(el("span","badge",p.cat));
  head.appendChild(el("h2",null,p.local));
  if(p.eng && p.eng!==p.local) head.appendChild(el("div","eng",p.eng));
  const loc=el("div","loc");
  loc.innerHTML=b.name+" &middot; "+s.strip+" &middot; "+p.pos+" &middot; <span style='color:var(--ink-faint)'>"+id+"</span>";
  head.appendChild(loc);
  if(p.sci) head.appendChild(el("div","sci",p.sci));
  v.appendChild(head);

  const sc=el("div","sect");sc.appendChild(el("h3","","Status"));
  const seg=el("div","seg");const cur=effStatus(p,rec);
  STATUSES.forEach(st=>{
    const btn=el("button","s-"+st.split(" ")[0],st);btn.setAttribute("aria-pressed",cur===st);
    btn.onclick=async()=>{rec.status=st;seg.querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed","false"));
      btn.setAttribute("aria-pressed","true");await putRec(rec);toast();};
    seg.appendChild(btn);});
  sc.appendChild(seg);
  const f1=el("div","field");f1.innerHTML="<label>Condition / disease</label>";
  const ci=el("input");ci.type="text";ci.value=rec.condition||"";ci.placeholder="e.g. leaf spot, borer";
  ci.onchange=async()=>{rec.condition=ci.value;await putRec(rec);toast();};f1.appendChild(ci);sc.appendChild(f1);
  const f2=el("div","field");f2.innerHTML="<label>Action needed</label>";
  const ai=el("input");ai.type="text";ai.value=rec.action||"";ai.placeholder="e.g. prune, neem spray";
  ai.onchange=async()=>{rec.action=ai.value;await putRec(rec);toast();};f2.appendChild(ai);sc.appendChild(f2);
  v.appendChild(sc);

  const pc=el("div","sect");pc.appendChild(el("h3","","Photos"));
  const add=el("label","addph");add.innerHTML="＋&nbsp; Add from Photos / Camera";
  const file=el("input");file.type="file";file.accept="image/*";file.multiple=true;file.style.display="none";
  add.appendChild(file);pc.appendChild(add);
  const gal=el("div","gallery");pc.appendChild(gal);
  function drawGallery(){gal.innerHTML="";
    (rec.photos||[]).slice().reverse().forEach(ph=>{
      const fig=el("figure");const img=el("img");img.src=ph.url;img.alt="";
      img.onclick=()=>{$("#lbimg").src=ph.url;$("#lightbox").classList.add("open");};
      fig.appendChild(img);
      const del=el("button","del","×");del.onclick=async(e)=>{e.stopPropagation();
        await deletePhoto(ph.path);
        rec.photos=rec.photos.filter(x=>x.id!==ph.id);await putRec(rec);drawGallery();toast();};
      fig.appendChild(del);fig.appendChild(el("figcaption",null,ph.date));gal.appendChild(fig);});}
  file.onchange=async()=>{const fs=[...file.files];if(!fs.length)return;
    rec.photos=rec.photos||[];
    for(const f of fs){const dataUrl=await compress(f);
      const up=await uploadPhoto(p.id,dataUrl);
      rec.photos.push({id:Date.now()+"-"+Math.random().toString(36).slice(2,6),
        date:new Date().toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"}),
        url:up.url,path:up.path});}
    await putRec(rec);file.value="";drawGallery();toast();};
  pc.appendChild(el("div","hint","Opens your iPhone Photos library (or camera). Add a photo each visit to build a growth timeline — newest shown first. Stored on this device."));
  drawGallery();v.appendChild(pc);

  const nc=el("div","sect");nc.appendChild(el("h3","","Notes"));
  const ta=el("textarea");ta.rows=4;ta.value=rec.notes||"";ta.placeholder="Observations, treatments, anything worth remembering…";
  let nt;ta.oninput=()=>{clearTimeout(nt);nt=setTimeout(async()=>{rec.notes=ta.value;await putRec(rec);toast();},500);};
  nc.appendChild(ta);v.appendChild(nc);
}
$("#lightbox").onclick=()=>$("#lightbox").classList.remove("open");

function compress(file){return new Promise(res=>{const reader=new FileReader();
  reader.onload=()=>{const img=new Image();img.onload=()=>{
    const max=1280;let w=img.width,h=img.height;const sc=Math.min(1,max/Math.max(w,h));
    const c=document.createElement("canvas");c.width=Math.round(w*sc);c.height=Math.round(h*sc);
    c.getContext("2d").drawImage(img,0,0,c.width,c.height);res(c.toDataURL("image/jpeg",.72));};
    img.src=reader.result;};reader.readAsDataURL(file);});}

/* ===== Auth gate: sign in once on each device, data syncs via Supabase ===== */
const loginView=$("#login"), appView=document.querySelector(".app"), signoutBtn=$("#signout");
async function showApp(yes){
  loginView.style.display=yes?"none":"grid";
  appView.style.display=yes?"":"none";
  signoutBtn.style.display=yes?"grid":"none";
  if(yes){await loadCatalog();route();}
}
$("#loginBtn").onclick=async()=>{
  const email=$("#email").value.trim(), password=$("#password").value;
  const msg=$("#loginMsg"); msg.textContent="Signing in…";
  const {error}=await sb.auth.signInWithPassword({email,password});
  msg.textContent=error?error.message:"";
};
$("#password").addEventListener("keydown",e=>{if(e.key==="Enter")$("#loginBtn").click();});
signoutBtn.onclick=()=>{if(confirm("Sign out?"))sb.auth.signOut();};
sb.auth.onAuthStateChange((_e,session)=>showApp(!!session));
sb.auth.getSession().then(({data})=>showApp(!!data.session));
</script>
